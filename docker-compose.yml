services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "9000:9000"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel-user
      MYSQL_PASSWORD: laravel-pass
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "8084:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - .:/var/www/html
    depends_on:
      - app

volumes:
  mysqldata:


