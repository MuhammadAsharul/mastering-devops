name: Build & Deploy Laravel

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t laravel-app -f Dockerfile .

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image ke Docker Hub
        run: |
          docker tag laravel-app ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build                 # Deploy HANYA jalan jika build berhasil
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Deploy ke server (simulasi lokal)
        run: |
          echo "Menarik image terbaru dari Docker Hub..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest
          echo "Deploy berhasil! Image siap dijalankan."

